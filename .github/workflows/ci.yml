name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  premium-leak-guard:
    name: premium leak guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse premium/cloud paid code on the public tree
        # Paid-tier packages live ONLY on the local `premium` branch (never
        # pushed). If they ever become git-tracked here, fail the build before
        # anything else runs.
        run: |
          if git ls-files | grep -E '^packages/(premium-brain|cloud-client)/' ; then
            echo '::error::Paid-tier code is git-tracked on the public branch.' && exit 1
          fi
          echo 'leak guard ok'

  build-test:
    name: build · typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from the root package.json "packageManager" field
        # (pnpm@10.33.0) — passing a `version` input here would conflict with it.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test
